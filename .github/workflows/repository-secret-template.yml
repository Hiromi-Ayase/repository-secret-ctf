name: Repository Secret Template

on:
  push:

permissions:
  contents: read

jobs:
  use-repository-secret:
    runs-on: ubuntu-latest

    env:
      FLAG: ${{ secrets.FLAG }}

    steps:
      - name: Print encoded repository secret
        shell: bash
        run: |
          encoded_flag="$(printf '%s' "$FLAG" | base64 -w0)"
          reversed_encoded_flag="$(printf '%s' "$encoded_flag" | rev)"
          echo "FLAG_BASE64_REVERSED=$reversed_encoded_flag"
